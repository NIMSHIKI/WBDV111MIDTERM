<!DOCTYPE html>
<html>

<head>
    <title>Reservation</title>

    <link rel="stylesheet" href="mystyle.css">
    <!-- You can keep your external script.js, or use the one below -->
    <script defer src="script.js"></script>
</head>

<body>

<header>
    <h1 class="logo">Hotel Reservation</h1>

    <nav>
        <a href="html.html">Home</a>
        <a href="hompage.html">Home Page</a>
    </nav>

</header>
 <!-- MAIN CONTAINER: Slider + Form -->
        <div class="main-container">
            
            <!-- LEFT SIDE: Sliding Photos -->
            <div class="slider-container">
                <img class="slide active" src="room1.jfif" alt="Hotel Room 1">
                <img class="slide" src="room2.png" alt="Hotel Room 2">
                <img class="slide" src="room3.jpg" alt="Hotel Room 3">
            </div>

            <!-- RIGHT SIDE: Reservation Form -->
            <div class="form-container">
                <h2 class="title">Reservation Form</h2>
                
                <form id="bookingForm">
                    <label>Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>

                    <label>Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label>Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>

                    <label>Check-in Date:</label>
                    <input type="date" id="checkIn" name="checkIn" required>

                    <label>Check-out Date:</label>
                    <input type="date" id="checkOut" name="checkOut" required>

                    <label>Guests:</label>
                    <input type="number" id="guests" name="guests" min="1" max="10" required>

                    <label>Room Type:</label>
                    <select id="roomType" name="roomType" required>
                        <option value="">Select Room</option>
                        <option value="Deluxe Room">Deluxe Room</option>
                        <option value="Suite Room">Suite Room</option>
                        <option value="Luxury Suite">Luxury Suite</option>
                    </select>

                    <button type="submit">Book Now</button>
                </form>
            </div>

        </div>

</form>
