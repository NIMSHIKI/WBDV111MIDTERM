<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STOCKMASTER</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #login-screen form {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        #login-screen h2 {
            margin-bottom: 20px;
            color: var(--text-main);
        }
        #login-screen input {
            width: 100%;
            margin-bottom: 15px;
        }
        #login-screen button {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form onsubmit="login(event)">
        <h2>STOCKMASTER</h2>
        <p>Login to access your stock management system</p>
        <input type="text" placeholder="Operator ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn">Login</button>
        <p style="margin-top: 15px; font-size: 0.9em;"><a href="#" style="color: var(--accent-color);">Forgot Password?</a></p>
    </form>
</div>

<script>
    function login(event) {
        event.preventDefault();
        // Simple login simulation
        alert('Login successful! Redirecting to dashboard...');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
