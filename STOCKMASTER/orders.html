<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - STOCKMASTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>STOCKMASTER</h2>
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="inventory.html" class="nav-link">Inventory</a>
        <a href="orders.html" class="nav-link active">Orders</a>
        <a href="suppliers.html" class="nav-link">Suppliers</a>
        <a href="reports.html" class="nav-link">Reports</a>
    </div>

    <div class="main">
        <h1>Order Management</h1>
        <p>Track and manage your orders.</p>

        <div class="card">
            <h3>Place New Order</h3>
            <form id="orderForm">
                <input type="text" id="productName" placeholder="Product Name" required>
                <input type="number" id="quantity" placeholder="Quantity" required>
                <input type="text" id="supplier" placeholder="Supplier" required>
                <input type="date" id="orderDate" required>
                <select id="status" required>
                    <option value="">Select Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Delivered">Delivered</option>
                </select>
                <button type="submit" class="btn">Place Order</button>
            </form>
        </div>

        <div class="card">
            <h3>Order List</h3>
            <table id="orderTable">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Supplier</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Widget A</td>
                        <td>100</td>
                        <td>ABC Supplies</td>
                        <td>2026-04-01</td>
                        <td>Delivered</td>
                        <td><button class="btn">Update</button> <button class="btn">Cancel</button></td>
                    </tr>
                    <tr>
                        <td>Gadget B</td>
                        <td>50</td>
                        <td>XYZ Distributors</td>
                        <td>2026-04-03</td>
                        <td>Shipped</td>
                        <td><button class="btn">Update</button> <button class="btn">Cancel</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const product = document.getElementById('productName').value;
            const quantity = document.getElementById('quantity').value;
            const supplier = document.getElementById('supplier').value;
            const date = document.getElementById('orderDate').value;
            const status = document.getElementById('status').value;

            const table = document.getElementById('orderTable').getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            newRow.innerHTML = `
                <td>${product}</td>
                <td>${quantity}</td>
                <td>${supplier}</td>
                <td>${date}</td>
                <td>${status}</td>
                <td><button class="btn">Update</button> <button class="btn">Cancel</button></td>
            `;

            // Clear form
            this.reset();
        });
    </script>
</body>
</html>
