<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - STOCKMASTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>STOCKMASTER</h2>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="inventory.html" class="nav-link active">Inventory</a>
    <a href="suppliers.html" class="nav-link">Suppliers</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="reports.html" class="nav-link">Reports</a>
    <a href="info.html" class="nav-link">Info</a>
</div>

<div class="main">
    <h1>Stock Inventory</h1>
    <p>Manage your inventory items.</p>

    <div class="card">
        <h3>Add New Item</h3>
        <form id="itemForm">
            <input type="text" id="sku" placeholder="SKU" required>
            <input type="text" id="itemName" placeholder="Item Name" required>
            <input type="number" id="quantity" placeholder="Quantity" required>
            <input type="number" step="0.01" id="price" placeholder="Price" required>
            <button type="submit" class="btn">Add Item</button>
        </form>
    </div>

    <div class="card">
        <h3>Inventory List</h3>
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>SM-001</td>
                    <td>Bolt</td>
                    <td>5000</td>
                    <td>$0.10</td>
                    <td><button class="btn">Edit</button> <button class="btn">Delete</button></td>
                </tr>
                <tr>
                    <td>SM-002</td>
                    <td>Nut</td>
                    <td>3000</td>
                    <td>$0.05</td>
                    <td><button class="btn">Edit</button> <button class="btn">Delete</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('itemForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const sku = document.getElementById('sku').value;
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('quantity').value;
        const price = document.getElementById('price').value;

        const table = document.getElementById('inventoryTable').getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        newRow.innerHTML = `
            <td>${sku}</td>
            <td>${name}</td>
            <td>${qty}</td>
            <td>$${price}</td>
            <td><button class="btn">Edit</button> <button class="btn">Delete</button></td>
        `;

        // Clear form
        this.reset();
    });
</script>

</body>
</html>
