<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Events | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html">Nexus Events</a>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="tickets.html" data-nav="tickets">Tickets</a>
        <a href="contact.html" data-nav="contact">Contact</a>
        <a href="admin-login.html" data-nav="admin">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Let’s Talk</h1>
    <section class="grid" style="align-items:start;">
      <div class="panel">
        <h2 style="margin-top:0;">Contact the Crew</h2>
        <p>Need group rates, sponsorship info, or venue bookings? Drop a note and our team will reply within 24 hours.</p>
        <form class="form-grid">
          <label>
            Name
            <input type="text" placeholder="Your name">
          </label>
          <label>
            Email
            <input type="email" placeholder="you@email.com">
          </label>
          <label>
            Message
            <textarea placeholder="Tell us what you need..."></textarea>
          </label>
          <button class="btn btn--big" type="submit">Send Message</button>
        
    </section>
  </main>

 <footer class="footer">
    <div class="container footer-inner" style="display:flex; justify-content:center; align-items:center; text-align:center;">
      <p style="margin:0;">Nexus Events. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
