<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scholar Portal Login</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>

<div class="login-box">
    <h2>Scholar Login</h2>
    <div style="background: #f0f0f0; padding: 10px; margin-bottom: 15px; border-radius: 5px; font-size: 12px;">
        <p><strong>Test Credentials:</strong></p>
        <p>Student ID: <strong>2026-001</strong></p>
        <p>Password: <strong>admin</strong></p>
    </div>
    <form onsubmit="return login(event)">
        <input type="text" id="studentID" placeholder="Student ID" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit">Login</button>
    </form>
</div>

<script src="myscript.js"></script>
</body>
</html>
